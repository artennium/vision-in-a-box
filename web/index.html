<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Vision-in-a-Box: YOLOv8</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #canvasContainer { position: relative; margin-top: 20px; display: inline-block; }
        canvas { max-width: 100%; border: 1px solid #ccc; border-radius: 5px; }
        pre { text-align: left; background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow: auto; max-height: 200px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 AI Object Detection</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="uploadImage()">Detect Objects</button>

    <div id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>

    <h3>Raw JSON Output:</h3>
    <pre id="result">Waiting for input...</pre>
</div>

<script>
    async function uploadImage() {
        const input = document.getElementById('imageInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultArea = document.getElementById('result');

        if (!input.files[0]) {
            alert("Please select an image first!");
            return;
        }

        // 1. แสดงรูปภาพต้นฉบับบน Canvas
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);

        // 2. ส่งรูปไปประมวลผลที่ Backend
        const formData = new FormData();
        formData.append('file', input.files[0]);
        resultArea.innerText = "Processing...";

        try {
            const response = await fetch('/api/predict', { method: 'POST', body: formData });
            const data = await response.json();
            resultArea.innerText = JSON.stringify(data, null, 2);

            // 3. วาดกรอบสี่เหลี่ยมจากค่า BBox ใน JSON
            drawBoxes(data.predictions, ctx);
        } catch (error) {
            resultArea.innerText = "Error: " + error.message;
        }
    }

    function drawBoxes(predictions, ctx) {
        ctx.strokeStyle = "#00FF00"; // สีเขียว
        ctx.lineWidth = 5;
        ctx.font = "30px Arial";
        ctx.fillStyle = "#00FF00";

        predictions.forEach(pred => {
            const [x1, y1, x2, y2] = pred.bbox;
            // วาดสี่เหลี่ยม
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            // เขียนชื่อ Class และ Confidence
            ctx.fillText(
                `${pred.class} (${(pred.confidence * 100).toFixed(1)}%)`, 
                x1, y1 > 40 ? y1 - 10 : y1 + 30
            );
        });
    }
</script>
</body>
</html>
